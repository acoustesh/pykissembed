version: 2

updates:
  # The root uv workspace includes the cloud package, so this covers both
  # manifests and locks.
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "06:00"
      timezone: "UTC"
    groups:
      uv-dependencies:
        patterns:
          - "*"

  # Keep the pinned actions used by every workflow up to date.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "06:00"
      timezone: "UTC"
    groups:
      github-actions:
        patterns:
          - "*"
