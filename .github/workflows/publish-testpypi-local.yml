# Publish pykissembed-local to TestPyPI via trusted publishing.
#
# Separate workflow file from publish-testpypi.yml so the
# (Owner, Repo, Workflow filename, Environment) tuple is unique
# per PyPI project — PyPI rejects re-pointing an existing tuple
# to a different project. The core package stays on the legacy
# workflow; this file handles the local subpackage.
#
# Before the first run, register a "pending publisher" on
# TestPyPI for pykissembed-local with:
#
#   Owner:        acoustesh
#   Repository:   pykissembed
#   Workflow:     publish-testpypi-local.yml
#   Environment:  testpypi-local
#
# https://test.pypi.org/manage/account/publishing/
#
# When production PyPI is set up, repeat the same steps against
# https://pypi.org/manage/account/publishing/ and switch the
# `repository-url` below to https://upload.pypi.org/legacy/.

name: publish-testpypi-local

"on":
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build pykissembed-local ${{ github.ref_name }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build
        run: python -m pip install --upgrade build

      - name: Build sdist + wheel
        working-directory: pykissembed-local
        run: python -m build --sdist --wheel

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-pykissembed-local
          path: pykissembed-local/dist/

  publish:
    name: Publish pykissembed-local to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    environment: testpypi-local
    permissions:
      # Required for PyPI trusted publishing (OIDC).
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist-pykissembed-local
          path: pykissembed-local/dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: pykissembed-local/dist/
          repository-url: https://test.pypi.org/legacy/
          # skip-existing avoids spurious failures when the same tag
          # is re-pushed; the version is still monotonic across tags.
          skip-existing: true
