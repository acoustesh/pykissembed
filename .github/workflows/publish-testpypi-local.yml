# Publish pykissembed-local to TestPyPI via API token.
#
# Sibling workflow to publish-testpypi.yml — publishes the local
# subpackage. Each project gets its own dedicated workflow so the
# artifact name, package path, and trigger file stay unambiguous.
#
# Required GitHub secret: ``TESTPYPI_TOKEN`` (shared across all
# three TestPyPI workflows). See the header in
# publish-testpypi.yml for how to generate and store it.
#
# When production PyPI is set up, switch the ``repository-url``
# below to https://upload.pypi.org/legacy/ and add a parallel
# ``PYPI_TOKEN`` secret.

name: publish-testpypi-local

"on":
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build pykissembed-local ${{ github.ref_name }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build
        run: python -m pip install --upgrade build

      - name: Build sdist + wheel
        working-directory: pykissembed-local
        run: python -m build --sdist --wheel

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-pykissembed-local
          path: pykissembed-local/dist/

  publish:
    name: Publish pykissembed-local to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    environment: testpypi-local
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist-pykissembed-local
          path: pykissembed-local/dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: pykissembed-local/dist/
          repository-url: https://test.pypi.org/legacy/
          # skip-existing avoids spurious failures when the same tag
          # is re-pushed; the version is still monotonic across tags.
          skip-existing: true
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.TESTPYPI_TOKEN }}
