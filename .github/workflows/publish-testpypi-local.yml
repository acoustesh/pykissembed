# Publish pykissembed-local to TestPyPI via API token.
#
# Sibling workflow to publish-testpypi.yml — publishes the local
# subpackage. Each project gets its own dedicated workflow so the
# artifact name, package path, and trigger file stay unambiguous.
#
# Required GitHub secret: ``TESTPYPI_TOKEN`` (shared across all
# three TestPyPI workflows). See the header in
# publish-testpypi.yml for how to generate and store it.
#
# When production PyPI is set up, switch the ``repository-url``
# below to https://upload.pypi.org/legacy/ and add a parallel
# ``PYPI_TOKEN`` secret.

name: publish-testpypi-local

"on":
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-*"
  workflow_dispatch:

permissions:
  contents: read

# Force the JS-actions runtime to Node 24 ahead of GitHub's default flip
# (June 16, 2026). Once Node 20 is fully removed (fall 2026), this env
# becomes a no-op and can be dropped. See:
# https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build pykissembed-local ${{ github.ref_name }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install build
        run: python -m pip install --upgrade build

      - name: Build sdist + wheel
        working-directory: pykissembed_local
        run: python -m build --sdist --wheel

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-pykissembed-local
          path: pykissembed_local/dist/

  publish:
    name: Publish pykissembed-local to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    environment: testpypi-local
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist-pykissembed-local
          path: pykissembed_local/dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.TESTPYPI_TOKEN }}
          packages-dir: pykissembed_local/dist/
          repository-url: https://test.pypi.org/legacy/
          # skip-existing avoids spurious failures when the same tag
          # is re-pushed; the version is still monotonic across tags.
          skip-existing: true
