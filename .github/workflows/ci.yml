# pykissembed CI — runs the library's own checks against itself.
#
# Triggered on push to main and on pull requests. Uses pykissembed's own
# reusable workflow (defined below) to validate that the library still
# works on a clean tree.
name: CI

"on":
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Force the JS-actions runtime to Node 24 ahead of GitHub's default flip
# (June 16, 2026). Once Node 20 is fully removed (fall 2026), this env
# becomes a no-op and can be dropped. See:
# https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  pykissembed:
    uses: ./.github/workflows/pykissembed.yml
    with:
      python-version: "3.12"
      mode: strict
      install-local: true
      install-cloud: true
      run-smoke: true

  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install build
        run: python -m pip install --upgrade build
      - name: Build sdist
        run: python -m build --sdist
      - name: Build wheel
        run: python -m build --wheel
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/