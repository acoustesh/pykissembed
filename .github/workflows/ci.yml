# pykissembed CI — runs the library's own checks against itself.
#
# Triggered on push to main and on pull requests. Uses pykissembed's own
# reusable workflow (defined below) to validate that the library still
# works on a clean tree.
name: CI

"on":
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  pykissembed:
    uses: ./.github/workflows/pykissembed.yml
    with:
      python-version: "3.12"
      mode: strict
      install-local: true
      install-cloud: true
      run-smoke: true

  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build
        run: python -m pip install --upgrade build
      - name: Build sdist
        run: python -m build --sdist
      - name: Build wheel
        run: python -m build --wheel
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/