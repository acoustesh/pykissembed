# pykissembed CI — runs the library's own checks against itself.
#
# Triggered on push to main and on pull requests. Uses pykissembed's own
# reusable workflow (defined below) to validate that the library still
# works on a clean tree.
name: CI

"on":
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Force the JS-actions runtime to Node 24 ahead of GitHub's default flip
# (June 16, 2026). Once Node 20 is fully removed (fall 2026), this env
# becomes a no-op and can be dropped. See:
# https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  pykissembed:
    uses: ./.github/workflows/pykissembed.yml
    with:
      python-version: "3.14"
      mode: strict
      install-cloud: true
      run-smoke: true

  build:
    name: Build ${{ matrix.name }} sdist + wheel
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: core
            source: "."
            artifact: dist-pykissembed
          - name: cloud
            source: pykissembed_cloud
            artifact: dist-pykissembed-cloud
          - name: local-tombstone
            source: pykissembed_local
            artifact: dist-pykissembed-local
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install build
        run: python -m pip install --upgrade build twine
      - name: Build sdist
        working-directory: ${{ matrix.source }}
        run: python -m build --sdist
      - name: Build wheel
        working-directory: ${{ matrix.source }}
        run: python -m build --wheel
      - name: Validate distribution metadata
        working-directory: ${{ matrix.source }}
        run: python -m twine check dist/*
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.source }}/dist/

  compatibility-package-tests:
    name: Test ${{ matrix.name }} package
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: cloud
            source: pykissembed_cloud
          - name: local-tombstone
            source: pykissembed_local
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install package and test dependencies
        working-directory: ${{ matrix.source }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install . --group dev
      - name: Install core Provider contract for cloud tests
        if: matrix.name == 'cloud'
        run: python -m pip install .
      - name: Run package tests without live provider calls
        working-directory: ${{ matrix.source }}
        run: python -m pytest -p no:pykissembed -m "not live" --tb=short

  dependency-policy:
    name: Dependency and isolated-wheel policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install policy test dependencies
        run: |
          python -m pip install --upgrade pip uv
          python -m pip install . --group dev
      - name: Run manifest, lock, wheel, and isolated-install checks
        run: >-
          python -m pytest -p no:pykissembed -o addopts=''
          tests/test_dependency_policy.py tests/test_install_extras.py --tb=short
