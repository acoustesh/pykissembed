# Reusable workflow: run pykissembed's own checks against a consumer repo.
#
# Usage from a consumer repo:
#
#   .github/workflows/pykissembed.yml:
#     jobs:
#       pykissembed:
#         uses: acoustesh/pykissembed/.github/workflows/pykissembed.yml@v1
#         with:
#           mode: ratchet    # or "strict"
#           python-version: "3.12"
#
# Workflow_call inputs (all optional except mode):
name: pykissembed

# `on:` must be quoted — YAML 1.1 treats `on` as a boolean alias for
# `true`, which silently breaks the file and makes GitHub report
# "Unable to find reusable workflow" when something tries to call it.
"on":
  workflow_call:
    inputs:
      python-version:
        description: "Python version"
        required: false
        type: string
        default: "3.12"
      mode:
        description: "pykissembed mode (ratchet or strict)"
        required: true
        type: string
      install-local:
        description: "Install pykissembed-local for similarity"
        required: false
        type: boolean
        default: false
      install-cloud:
        description: "Install pykissembed-cloud for similarity"
        required: false
        type: boolean
        default: false
      run-smoke:
        description: "Run live + smoke tests after the main gate (requires install-local and/or install-cloud)."
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  pykissembed:
    name: pykissembed (${{ inputs.mode }})
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install pykissembed from source
        run: |
          python -m pip install --upgrade pip
          python -m pip install .
          if [ "${{ inputs.install-local }}" = "true" ]; then
            pip install ./pykissembed_local
          fi
          if [ "${{ inputs.install-cloud }}" = "true" ]; then
            pip install ./pykissembed_cloud
          fi

      - name: Init baselines (first run only)
        run: |
          if [ ! -f tests/baselines/lint_typecheck.json ]; then
            pytest --update-baselines || true
          fi

      - name: Run pykissembed (${{ inputs.mode }})
        run: pytest -m "not experimental" --tb=short

      - name: Ratchet baselines (ratchet mode only)
        if: inputs.mode == 'ratchet'
        run: |
          pykissembed ratchet || true
          git diff --exit-code tests/baselines/ || {
            echo "::warning::Baselines were ratcheted — review the diff and commit."
            exit 0
          }

      # --- Live smoke gate ---------------------------------------------------
      # Caches the HuggingFace model weights so the ~120 MB bge-small-en-v1.5
      # download only happens once per CI run. The cache key is derived from
      # the provider module's hash so any change to the default model id
      # invalidates the cache automatically.
      - name: Cache HuggingFace model weights
        if: inputs.run-smoke && inputs.install-local
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-${{ hashFiles('pykissembed_local/pykissembed_local/provider.py') }}-bge-small-en-v1.5
          restore-keys: |
            hf-${{ hashFiles('pykissembed_local/pykissembed_local/provider.py') }}-
            hf-

      - name: Run live smoke tests (local)
        if: inputs.run-smoke && inputs.install-local
        working-directory: pykissembed_local
        run: pytest -m "live and smoke" --tb=short

      - name: Run live smoke tests (cloud)
        if: inputs.run-smoke && inputs.install-cloud
        working-directory: pykissembed_cloud
        env:
          # Use the repo's own .env if present; otherwise rely on the secret.
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: pytest -m "live and smoke" --tb=short