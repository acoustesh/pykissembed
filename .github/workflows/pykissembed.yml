# Reusable workflow: run pykissembed's own checks against a consumer repo.
#
# Usage from a consumer repo:
#
#   .github/workflows/pykissembed.yml:
#     jobs:
#       pykissembed:
#         uses: acoustesh/pykissembed/.github/workflows/pykissembed.yml@v1
#         with:
#           mode: ratchet    # or "strict"
#           python-version: "3.12"
#
# Workflow_call inputs (all optional except mode):
name: pykissembed

# `on:` must be quoted — YAML 1.1 treats `on` as a boolean alias for
# `true`, which silently breaks the file and makes GitHub report
# "Unable to find reusable workflow" when something tries to call it.
"on":
  workflow_call:
    inputs:
      python-version:
        description: "Python version"
        required: false
        type: string
        default: "3.14"
      mode:
        description: "pykissembed mode (ratchet or strict)"
        required: true
        type: string
      install-local:
        description: "Deprecated v1 compatibility input; installs the cloud extra and tombstone"
        required: false
        type: boolean
        default: false
      install-cloud:
        description: "Install pykissembed-cloud for similarity"
        required: false
        type: boolean
        default: false
      run-smoke:
        description: "Run live cloud smoke tests after the main gate (requires install-cloud)."
        required: false
        type: boolean
        default: false

permissions:
  contents: read

# Force the JS-actions runtime to Node 24 ahead of GitHub's default flip
# (June 16, 2026). Once Node 20 is fully removed (fall 2026), this env
# becomes a no-op and can be dropped. See:
# https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  pykissembed:
    name: pykissembed (${{ inputs.mode }})
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install pykissembed from source
        run: |
          python -m pip install --upgrade pip
          python -m pip install .
          # Install dev tooling (pytest-xdist, pytest-cov) so the
          # `addopts = [..., "-n", "auto"]` block in pyproject.toml works
          # in CI. Without this, pytest errors out with
          # `unrecognized arguments: -n`. PEP 735 groups require pip 25+;
          # the runner ships with pip 24.0 but `pip install --upgrade pip`
          # above pulls a pip 26.x that supports `--group`.
          python -m pip install --group dev
          if [ "${{ inputs.install-local }}" = "true" ]; then
            echo "::warning::install-local is deprecated; installing cloud support plus the lightweight tombstone"
            pip install ./pykissembed_cloud ./pykissembed_local
          fi
          if [ "${{ inputs.install-cloud }}" = "true" ]; then
            pip install ./pykissembed_cloud
          fi

      - name: Init baselines (first run only)
        run: |
          if [ ! -f tests/baselines/lint_typecheck.json ]; then
            pytest --update-baselines || true
          fi

      - name: Run pykissembed (${{ inputs.mode }})
        run: pytest -m "not experimental" --tb=short

      - name: Ratchet baselines (ratchet mode only)
        if: inputs.mode == 'ratchet'
        run: |
          pykissembed ratchet || true
          git diff --exit-code tests/baselines/ || {
            echo "::warning::Baselines were ratcheted — review the diff and commit."
            exit 0
          }

      # Live cloud smoke tests use fixed synthetic strings and are best-effort:
      # missing keys or transient provider failures do not block the main gate.
      - name: Run live smoke tests (cloud)
        if: inputs.run-smoke && inputs.install-cloud
        continue-on-error: true
        working-directory: pykissembed_cloud
        env:
          # Use the repo's own .env if present; otherwise rely on the secret.
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: pytest -m "live and smoke" --tb=short
