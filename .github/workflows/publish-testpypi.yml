# Publish the **core** pykissembed package to TestPyPI via API token.
#
# This workflow publishes **only** the core package. The local and
# cloud subpackages are published by sibling workflows so each PyPI
# project gets its own dedicated publish step (one artifact name,
# one path, one token consumer). See:
#
#   - publish-testpypi-local.yml  →  pykissembed-local
#   - publish-testpypi-cloud.yml  →  pykissembed-cloud
#
# All three workflows share the same tag triggers (``v*.*.*`` and
# ``v*.*.*-*``), so a single ``git push --tags`` fans out to all
# three uploads in parallel.
#
# Required GitHub secret: ``TESTPYPI_TOKEN`` — a TestPyPI API token
# scoped to the entire ``acoustesh`` account. Generate one at
# https://test.pypi.org/manage/account/token/ (scope: "Entire
# account") and add it under
# https://github.com/acoustesh/pykissembed/settings/secrets/actions.
#
# When production PyPI is set up, switch the ``repository-url``
# below to https://upload.pypi.org/legacy/ and add a parallel
# ``PYPI_TOKEN`` secret.

name: publish-testpypi

"on":
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-*"
  workflow_dispatch:

permissions:
  contents: read

# Force the JS-actions runtime to Node 24 ahead of GitHub's default flip
# (June 16, 2026). Once Node 20 is fully removed (fall 2026), this env
# becomes a no-op and can be dropped. See:
# https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build pykissembed ${{ github.ref_name }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install build
        run: python -m pip install --upgrade build

      - name: Build sdist + wheel
        working-directory: .
        run: python -m build --sdist --wheel

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-pykissembed
          path: dist/

  publish:
    name: Publish pykissembed to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    environment: testpypi
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist-pykissembed
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.TESTPYPI_TOKEN }}
          packages-dir: dist/
          repository-url: https://test.pypi.org/legacy/
          # skip-existing avoids spurious failures when the same tag
          # is re-pushed; the version is still monotonic across tags.
          skip-existing: true
