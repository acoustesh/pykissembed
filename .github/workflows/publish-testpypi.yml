# Publish the **core** pykissembed package to TestPyPI via trusted
# publishing.
#
# This workflow publishes **only** the core package. The local and
# cloud subpackages are published by sibling workflows so each PyPI
# project gets a unique (Owner, Repository, Workflow filename,
# Environment) tuple — PyPI rejects re-pointing an existing tuple
# to a different project. See:
#
#   - publish-testpypi-local.yml  →  pykissembed-local  (env: testpypi-local)
#   - publish-testpypi-cloud.yml  →  pykissembed-cloud  (env: testpypi-cloud)
#
# All three workflows share the same tag triggers (``v*.*.*`` and
# ``v*.*.*-*``), so a single ``git push --tags`` fans out to all
# three uploads in parallel.
#
# Before the first run, the trusted publisher must be registered on
# TestPyPI for **each** of the three packages:
#
#   https://test.pypi.org/manage/account/publishing/
#
# For pykissembed (this workflow):
#
#   Owner:        acoustesh
#   Repository:   pykissembed
#   Workflow:     publish-testpypi.yml
#   Environment:  testpypi
#
# For the sibling workflows, see the comment block at the top of
# each file.
#
# When production PyPI is set up, repeat the same steps against
# https://pypi.org/manage/account/publishing/ and switch the
# `repository-url` below to https://upload.pypi.org/legacy/.

name: publish-testpypi

"on":
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build pykissembed ${{ github.ref_name }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build
        run: python -m pip install --upgrade build

      - name: Build sdist + wheel
        working-directory: .
        run: python -m build --sdist --wheel

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-pykissembed
          path: dist/

  publish:
    name: Publish pykissembed to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      # Required for PyPI trusted publishing (OIDC).
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist-pykissembed
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          # skip-existing avoids spurious failures when the same tag
          # is re-pushed; the version is still monotonic across tags.
          skip-existing: true
